name: Deploy to Azure VM

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      phase:
        description: 'Deployment phase (dev/staging/production)'
        required: true
        type: string
      pipeline_run_id:
        description: 'Pipeline run identifier'
        required: true
        type: string
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd /opt/project
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            echo "✅ Deployment successful! Phase: ${{ inputs.phase }}, Run: ${{ inputs.pipeline_run_id }}"
