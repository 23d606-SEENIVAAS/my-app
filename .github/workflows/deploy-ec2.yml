name: Build and Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_type:
        description: Deployment type
        required: false
        default: ec2
      target_env:
        description: Target environment
        required: false
        default: dev

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ARTIFACT_BUCKET: yinatra-artifacts-416500109754
  PROJECT_NAME: my-app

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package artifact
        run: |
          ARTIFACT_NAME="my-app-${GITHUB_SHA:0:7}.tar.gz"
          tar -czf "/tmp/$ARTIFACT_NAME" --exclude=.git .
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV
          echo "ARTIFACT_KEY=artifacts/my-app/${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::416500109754:role/github-actions-deployer
          aws-region: ap-south-1

      - name: Upload artifact to S3
        run: |
          aws s3 cp "/tmp/$ARTIFACT_NAME" "s3://yinatra-artifacts-416500109754/$ARTIFACT_KEY"
          echo "Uploaded successfully"
