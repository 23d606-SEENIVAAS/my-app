# GitHub Actions workflow for EC2 deployment via Ops Control Panel
# Copy this file to .github/workflows/deploy-ec2.yml in your project repo
#
# Required: Replace my-app with your project slug
# Optional: Set OPS_PANEL_URL and WEBHOOK_SECRET as repository secrets

name: Build & Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_type:
        description: 'Deployment type'
        required: false
        default: 'ec2'
        type: string
      target_env:
        description: 'Target environment'
        required: false
        default: 'dev'
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ARTIFACT_BUCKET: yinatra-artifacts-416500109754
  PROJECT_NAME: 'my-app'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package artifact
        run: |
          ARTIFACT_NAME="${PROJECT_NAME}-${GITHUB_SHA:0:7}.tar.gz"
          tar -czf "$ARTIFACT_NAME" \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.env* \
            package.json package-lock.json dist/ public/
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV
          echo "ARTIFACT_KEY=artifacts/${PROJECT_NAME}/${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::653893523849:role/github-actions-deployer
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload artifact to S3
        run: |
          aws s3 cp "$ARTIFACT_NAME" "s3://${ARTIFACT_BUCKET}/${ARTIFACT_KEY}"
          echo "Uploaded: s3://${ARTIFACT_BUCKET}/${ARTIFACT_KEY}"
